name: CI

# Pytest CI for the sksecurity Python package.
# Runs on GitHub-hosted runners (NOT a sovereign host).
#
# Honest exclusions (this repo defines NO pytest markers, so exclusion is by
# explicit node id / file, documented here rather than hidden behind a fake skip):
#
#   * tests/test_truth_engine.py is IGNORED — it imports a private symbol
#     (`_check_skmemory`) that no longer exists in sksecurity/truth_engine.py,
#     so it is a hard collection-time ImportError on every runner. This is a
#     pre-existing broken test, not a flaky one; it is tracked separately and
#     excluded honestly rather than silently passed.
#
#   * The four "integrated-mode" tests in tests/test_integration_adapter.py
#     (test_alert_publishes_severity_topic, test_ensure_schedule_registers_intel_refresh,
#     test_register_self_writes_registry, test_monitor_event_shares_threat) are
#     DESELECTED — they hard-`import skcapstone`, a sovereign sibling package that
#     is NOT published to PyPI, so it cannot be installed on a public runner. The
#     standalone/absent-mode integration tests in the same file (which prove the
#     native-fallback contract WITHOUT skcapstone) still run.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Run pytest
        run: |
          python -m pytest tests/ -v --tb=short \
            --ignore=tests/test_truth_engine.py \
            --deselect "tests/test_integration_adapter.py::test_alert_publishes_severity_topic" \
            --deselect "tests/test_integration_adapter.py::test_ensure_schedule_registers_intel_refresh" \
            --deselect "tests/test_integration_adapter.py::test_register_self_writes_registry" \
            --deselect "tests/test_integration_adapter.py::test_monitor_event_shares_threat"
